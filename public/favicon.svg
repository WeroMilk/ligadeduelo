<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1A2744"/>
      <stop offset="100%" stop-color="#0A0E1A"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0D78C"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="crystal" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="45%" stop-color="#7EC8FF"/>
      <stop offset="100%" stop-color="#2B7FD4"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="#C9A84C" stroke-width="3"/>
  <!-- left sword -->
  <g transform="translate(32 36) rotate(-38)">
    <rect x="-2.2" y="-22" width="4.4" height="28" rx="1.2" fill="url(#gold)"/>
    <rect x="-7" y="4" width="14" height="3.2" rx="1" fill="url(#gold)"/>
    <rect x="-1.4" y="7" width="2.8" height="8" rx="1" fill="#8B6914"/>
    <polygon points="0,-28 -3.5,-22 3.5,-22" fill="#E8E8E8"/>
  </g>
  <!-- right sword -->
  <g transform="translate(32 36) rotate(38)">
    <rect x="-2.2" y="-22" width="4.4" height="28" rx="1.2" fill="url(#gold)"/>
    <rect x="-7" y="4" width="14" height="3.2" rx="1" fill="url(#gold)"/>
    <rect x="-1.4" y="7" width="2.8" height="8" rx="1" fill="#8B6914"/>
    <polygon points="0,-28 -3.5,-22 3.5,-22" fill="#E8E8E8"/>
  </g>
  <!-- crystal -->
  <polygon points="32,10 37,20 32,24 27,20" fill="url(#crystal)"/>
  <polygon points="32,10 34.5,20 32,22" fill="#FFFFFF" opacity="0.45"/>
</svg>
